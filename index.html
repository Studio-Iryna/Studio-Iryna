<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Iryna</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container header-inner">
    
    <div class="logo">
      <div class="logo-circle">Si</div>
      <div class="logo-text">Studio Iryna</div>
    </div>

    <nav class="nav">
      <a href="#" data-i18n="services"></a>
      <a href="#" data-i18n="portfolio"></a>
      <a href="#" data-i18n="about"></a>
      <a href="#" data-i18n="contact"></a>

      <span class="lang-switch">
        <button onclick="setLang('de')">DE</button>
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ru')">RU</button>
      </span>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content container">
    <h1 data-i18n="hero_title"></h1>
    <p data-i18n="hero_text"></p>
    <a href="#" class="btn" data-i18n="hero_btn"></a>
  </div>
</section>

<!-- SERVICES -->
<section class="services container">
  <h2 data-i18n="services_title"></h2>

  <div class="services-grid">
    <div class="service">
      <div class="icon">✏️</div>
      <h3 data-i18n="s1_title"></h3>
      <p data-i18n="s1_text"></p>
    </div>

    <div class="service">
      <div class="icon">📷</div>
      <h3 data-i18n="s2_title"></h3>
      <p data-i18n="s2_text"></p>
    </div>

    <div class="service">
      <div class="icon">🖨️</div>
      <h3 data-i18n="s3_title"></h3>
      <p data-i18n="s3_text"></p>
    </div>
  </div>
</section>

<!-- PORTFOLIO -->
<section class="portfolio container">
  <h2 data-i18n="portfolio"></h2>

  <div class="portfolio-grid">
    <img src="images/work1.jpg">
    <img src="images/work2.jpg">
    <img src="images/work3.jpg">
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer-inner">

    <div>
      <div class="logo">
        <div class="logo-circle">Si</div>
        <div class="logo-text">Studio Iryna</div>
      </div>

      <p>+41 79 443 05 18</p>
      <p>hello@studio-iryna.ch</p>
      <p data-i18n="country"></p>
    </div>

    <div>
      <a href="#" data-i18n="impressum"></a><br>
      <a href="#" data-i18n="privacy"></a>
    </div>

  </div>
</footer>

<!-- JS -->
<script>
const translations = {
  ru: {
    services: "Услуги",
    portfolio: "Проекты",
    about: "Обо мне",
    contact: "Контакты",

    hero_title: "Эстетика.<br>Точность.<br>Печать.",
    hero_text: "Графический дизайн и сопровождение печати в Швейцарии.",
    hero_btn: "НАЧАТЬ ПРОЕКТ",

    services_title: "Что я предлагаю",

    s1_title: "БРЕНДИНГ И ДИЗАЙН",
    s1_text: "Логотипы, фирменный стиль и печатная продукция",

    s2_title: "ОБРАБОТКА ФОТО",
    s2_text: "Ретушь, цветокоррекция и визуальный контент",

    s3_title: "ПЕЧАТЬ",
    s3_text: "Контроль качества и сопровождение печати",

    country: "Швейцария",
    impressum: "Правовая информация",
    privacy: "Политика конфиденциальности"
  },

  de: {
    services: "Dienstleistungen",
    portfolio: "Portfolio",
    about: "Über mich",
    contact: "Kontakt",

    hero_title: "Ästhetik.<br>Präzision.<br>Druckkunst.",
    hero_text: "Grafikdesign und professionelles Print Management in der Schweiz.",
    hero_btn: "PROJEKT STARTEN",

    services_title: "Was ich anbiete",

    s1_title: "BRANDING & DESIGN",
    s1_text: "Logos, Markenidentität und Druckdesign",

    s2_title: "FOTOBEARBEITUNG",
    s2_text: "Professionelle Retusche und Farbkorrektur",

    s3_title: "PRINT MANAGEMENT",
    s3_text: "Druck und Qualitätskontrolle",

    country: "Schweiz",
    impressum: "Impressum",
    privacy: "Datenschutz"
  },

  en: {
    services: "Services",
    portfolio: "Portfolio",
    about: "About",
    contact: "Contact",

    hero_title: "Aesthetics.<br>Precision.<br>Print.",
    hero_text: "Graphic design and print management in Switzerland.",
    hero_btn: "START PROJECT",

    services_title: "What I offer",

    s1_title: "BRANDING & DESIGN",
    s1_text: "Logos, brand identity and print design",

    s2_title: "PHOTO EDITING",
    s2_text: "Professional retouching and color correction",

    s3_title: "PRINT MANAGEMENT",
    s3_text: "Print and quality control",

    country: "Switzerland",
    impressum: "Legal notice",
    privacy: "Privacy policy"
  }
};

function setLang(lang) {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");

    if (translations[lang][key]) {
      el.innerHTML = translations[lang][key];
    }
  });

  localStorage.setItem("lang", lang);
}

const savedLang = localStorage.getItem("lang") || "de";
setLang(savedLang);
</script>

</body>
</html>
